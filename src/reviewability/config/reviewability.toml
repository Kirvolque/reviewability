# [mandatory] A hunk is considered problematic if its reviewability score drops below this.
# Scores range from 0.0 (hardest to review) to 1.0 (easiest to review).
hunk_score_threshold = 0.5

# [mandatory] A file is considered problematic if its reviewability score drops below this.
file_score_threshold = 0.5

# [mandatory] Maximum total lines changed across the entire diff (used for score normalisation).
max_diff_lines = 500

# [mandatory] Maximum lines changed in a single hunk (used for score normalisation).
max_hunk_lines = 50

# [mandatory] Maximum meaningful lines in the largest hunk of a move (used for move score normalisation).
max_move_lines = 45

# [mandatory] How much low similarity amplifies the per-line penalty for move scoring.
# penalty_per_line = (1 + move_similarity_penalty × (1 − similarity)) / max_move_lines
move_similarity_penalty = 2.0

# [optional] Overall diff score below this causes the gate to fail.
# Scores range from 0.0 (hardest to review) to 1.0 (easiest to review).
min_overall_score = 0.7

# [optional] Maximum number of problematic hunks allowed before a violation is raised.
max_problematic_hunks = 3

# [optional] Maximum number of problematic moves allowed before a violation is raised.
# max_problematic_moves = 2

# [optional] Maximum number of problematic files allowed before a violation is raised.
max_problematic_files = 2

# [optional] Maximum number of files changed in the diff before an error is raised.
max_files_changed = 10

# [optional] Maximum total added lines across the diff before an error is raised.
max_added_lines = 400

# [optional] Formula weights — controls how strongly each signal amplifies the size penalty.
# Remove this section to use the built-in defaults.
[weights]
# How strongly interleaving amplifies the size penalty in hunk and overall scores.
# 1.0 = full amplification; 0.0 = interleaving has no effect.
interleaving_weight = 1.0

# [optional] Per-extension prefixes for lines to exclude from analysis (imports, package
# declarations, and comment lines). Comment prefixes are included so that comment-only
# changes do not inflate hunk sizes, interleaving scores, or move detection.
# Use "*" as the fallback for file types not listed below.
# Remove this section entirely to use the built-in defaults.
[excluded_prefixes]
"*"    = ["import ", "#include ", "extern crate ", "package ", "// ", "/* ", "/** ", " * ", " */"]
".py"  = ["import ", "from ", "# "]
".go"  = ["import ", "package ", "// "]
".rs"  = ["use ", "extern crate ", "mod ", "// ", "/// "]
".java" = ["import ", "package ", "// ", "/* ", "/** ", " * "]
".kt"  = ["import ", "package ", "// ", "/* ", "/** ", " * "]
".scala" = ["import ", "package ", "// ", "/* ", " * "]
".cs"  = ["using ", "namespace ", "// ", "/* ", "/// ", " * "]
".js"  = ["import ", "from ", "require(", "require ", "// ", "/* ", " * "]
".ts"  = ["import ", "from ", "require(", "require ", "// ", "/* ", " * "]
".jsx" = ["import ", "from ", "require(", "require ", "// ", "/* ", " * "]
".tsx" = ["import ", "from ", "require(", "require ", "// ", "/* ", " * "]
".c"   = ["#include ", "// ", "/* ", " * "]
".h"   = ["#include ", "// ", "/* ", " * "]
".cpp" = ["#include ", "using ", "namespace ", "// ", "/* ", " * "]
".cc"  = ["#include ", "using ", "namespace ", "// ", "/* ", " * "]
".hpp" = ["#include ", "using ", "namespace ", "// ", "/* ", " * "]
".rb"  = ["require ", "require_relative ", "load ", "include ", "prepend ", "# "]
".php" = ["use ", "namespace ", "require ", "require_once ", "include ", "include_once ", "// ", "/* ", " * "]
".fs"  = ["open ", "module ", "namespace ", "// "]
".fsx" = ["open ", "module ", "// "]
".ml"  = ["open ", "module ", "(* "]
".mli" = ["open ", "module ", "(* "]
".swift" = ["import ", "// ", "/* ", " * "]
".hs"  = ["import ", "module ", "-- "]
".ex"  = ["import ", "alias ", "use ", "require ", "# "]
".exs" = ["import ", "alias ", "use ", "require ", "# "]
".sql" = ["-- ", "/* ", " * "]
".lua" = ["-- "]
".r"   = ["# "]
".R"   = ["# "]
